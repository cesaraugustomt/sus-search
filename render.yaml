services:
  - type: web
    name: sus-search-backend
    runtime: python
    plan: free
    pythonVersion: "3.12.0"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "https://sus-search-ppginfos.vercel.app,http://localhost:3000"

services:
  - type: web
    name: sus-search-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "https://sus-search-ppginfos.vercel.app,http://localhost:3000"

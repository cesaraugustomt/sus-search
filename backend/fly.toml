app = "sus-search-backend"
primary_region = "gru"   # São Paulo — mais próximo do Brasil

[build]
  dockerfile = "Dockerfile"   # usa o backend/Dockerfile com python:3.12-slim

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
